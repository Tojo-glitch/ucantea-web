<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hand-off Station | Ceramic</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  body { background: #0c0b09; color: #e8e0d4; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .header { padding: 24px 40px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
  .title { font-size: 24px; font-weight: 800; color: #d4aa6a; letter-spacing: 1px; text-transform: uppercase; }
  
  /* ช่องรับสัญญาณจากเครื่องสแกน (ซ่อนพรางตาไว้ แต่พร้อมรับค่าเสมอ) */
  #scanner-input { opacity: 0; position: absolute; top: -100px; }

  .main-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  
  .scan-prompt { text-align: center; transition: all 0.2s; }
  .scan-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
  .scan-text { font-size: 20px; color: #9e9080; }

  /* เอฟเฟกต์ตอนสแกนสำเร็จ */
  .success-flash { position: absolute; inset: 0; background: #4aad75; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .success-flash.on { opacity: 1; }
  .success-text { font-size: 48px; font-weight: 800; color: #fff; }
  .success-id { font-size: 24px; color: rgba(255,255,255,0.8); margin-top: 10px; }

  /* Fallback: กรณีสแกนเนอร์พัง ให้ใช้นิ้วจิ้มแทนได้ */
  .manual-grid { position: absolute; bottom: 0; left: 0; right: 0; height: 180px; background: #141310; border-top: 1px solid rgba(255,255,255,0.05); padding: 20px 40px; display: flex; gap: 12px; overflow-x: auto; }
  .manual-card { width: 140px; background: #1c1a17; border: 1px solid rgba(212,170,106,0.2); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: 0.1s; }
  .manual-card:active { transform: scale(0.95); background: #d4aa6a; color: #000; }
  .mc-id { font-size: 18px; font-weight: 800; color: #d4aa6a; }
  .manual-card:active .mc-id { color: #000; }
</style>
</head>
<body>

<div class="header">
  <div class="title">Hand-off Station</div>
  <div style="color:#9e9080; font-size:14px;">Waiting for scanner...</div>
</div>

<!-- ช่องรับค่าจาก Barcode Scanner -->
<input type="text" id="scanner-input" autocomplete="off">

<div class="main-area">
  <div class="scan-prompt">
    <div class="scan-icon">📇</div>
    <div class="scan-text">สแกนบาร์โค้ดบนสติกเกอร์เพื่อเรียกคิวลูกค้า</div>
  </div>

  <div class="success-flash" id="success-flash">
    <div class="success-text">ORDER READY!</div>
    <div class="success-id" id="success-id">CTB-XXXX</div>
  </div>
</div>

<div class="manual-grid" id="manual-grid">
  <!-- ออเดอร์ที่กำลังชง จะโชว์ตรงนี้เผื่อสแกนเนอร์พัง -->
</div>

<script src="/env-config.js"></script>
<script src="/api.js"></script>
<script>
  let preparingOrders = [];
  const scannerInput = document.getElementById('scanner-input');

  // บังคับให้ช่องสแกนเนอร์ Focus ตลอดเวลา (เครื่องสแกนคือ Keyboard ประเภทหนึ่ง)
  document.addEventListener('click', () => scannerInput.focus());
  scannerInput.focus();

  // เมื่อสแกนบาร์โค้ด (เครื่องสแกนจะยิงคำสั่ง Enter อัตโนมัติตอนจบ)
  scannerInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const orderId = this.value.trim().toUpperCase();
      this.value = ''; // ล้างค่าเตรียมรับอันถัดไป
      if (orderId) markAsReady(orderId);
    }
  });

  // โหลดข้อมูลเผื่อกด Manual
  function loadActiveOrders() {
    API.getAdminOrders().then(res => {
      if (res.success) {
        preparingOrders = res.data.filter(o => o.status === 'PREPARING');
        renderManualGrid();
      }
    });
  }

  function renderManualGrid() {
    const grid = document.getElementById('manual-grid');
    if (!preparingOrders.length) {
      grid.innerHTML = '<div style="color:#9e9080; width:100%; text-align:center; align-self:center;">ไม่มีคิวกำลังชง</div>';
      return;
    }
    grid.innerHTML = preparingOrders.map(o => `
      <div class="manual-card" onclick="markAsReady('${o.id}')">
        <div class="mc-id">${o.id.split('-').pop()}</div>
        <div style="font-size:11px; margin-top:4px;">แตะเพื่อเสิร์ฟ</div>
      </div>
    `).join('');
  }

  function markAsReady(orderId) {
    // อัปเดตสถานะเป็น READY (เพื่อไปทริกเกอร์หน้าจอ Board ให้กระดิ่งดัง)
    API.updateOrderStatus(orderId, 'READY').then(() => {
      showSuccessFlash(orderId);
      loadActiveOrders();
    }).catch(err => alert('ไม่พบออเดอร์นี้ หรือเกิดข้อผิดพลาด'));
  }

  function showSuccessFlash(id) {
    const flash = document.getElementById('success-flash');
    document.getElementById('success-id').textContent = id;
    flash.classList.add('on');
    
    // เล่นเสียงเตือนบาริสต้าเบาๆ ว่ายิงเข้าแล้ว
    const audio = new Audio('https://actions.google.com/sounds/v1/ui/beep_short.ogg');
    audio.play().catch(()=>{});

    setTimeout(() => { flash.classList.remove('on'); }, 1500);
  }

  // ดึงข้อมูลทุกๆ 5 วินาทีเผื่ออัปเดต Manual Grid
  setInterval(loadActiveOrders, 5000);
  loadActiveOrders();
</script>
</body>
</html>
