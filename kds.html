<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Ceramic KDS | ระบบออเดอร์ครัว</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─── TOKENS ─── */
    :root {
      --c0: #0c0b09;
      --c1: #141310;
      --c2: #1c1a17;
      --c3: #252320;
      --c4: #2f2d29;
      --tan: #e8e0d4;
      --tan2: #b8ad9e;
      --tan3: #9e9080;
      --gold: #b8924a;
      --gl: #d4aa6a;
      --grn: #4aad75;
      --grnl: #6dbb8a;
      --red: #d44f4f;
      --line: rgba(255,255,255,.07);
      --ln2: rgba(255,255,255,.12);
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Plus Jakarta Sans', 'Helvetica Neue', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--c0);
      color: var(--tan);
      font-family: var(--sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    button {
      font-family: var(--sans);
      cursor: pointer;
      border: none;
      outline: none;
    }

    /* ─── HEADER ─── */
    .kds-header {
      height: 70px;
      background: var(--c1);
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      flex-shrink: 0;
    }

    .brand {
      font-family: var(--serif);
      font-size: 26px;
      font-style: italic;
      color: var(--tan);
    }

    .brand span {
      color: var(--gl);
      font-size: 12px;
      font-family: var(--sans);
      font-style: normal;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-left: 8px;
      font-weight: 700;
    }

    .clock {
      font-size: 24px;
      font-weight: 700;
      color: var(--tan);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--tan2);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.red {
      background: #e88080;
      box-shadow: 0 0 10px rgba(232,128,128,0.4);
    }

    .dot.yellow {
      background: var(--gl);
      box-shadow: 0 0 10px rgba(212,170,106,0.4);
    }

    .dot.green {
      background: var(--grnl);
    }

    .refresh-btn {
      height: 40px;
      padding: 0 20px;
      background: var(--c2);
      border: 1px solid var(--ln2);
      border-radius: 8px;
      color: var(--tan);
      font-weight: 600;
      transition: all 0.2s;
    }

    .refresh-btn:active {
      transform: scale(0.97);
    }

    /* ─── MAIN COLUMNS ─── */
    .kds-board {
      display: flex;
      flex: 1;
      gap: 24px;
      padding: 24px 32px;
      overflow-x: auto;
      background: var(--c0);
    }

    .kds-col {
      flex: 1;
      background: var(--c1);
      border: 1px solid var(--line);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 280px;
    }

    .col-head {
      padding: 16px;
      font-family: var(--serif);
      font-size: 20px;
      text-align: center;
      border-bottom: 1px solid var(--line);
      font-weight: 600;
    }

    .col-head.new {
      background: rgba(232,128,128,0.1);
      color: #e88080;
    }

    .col-head.prep {
      background: rgba(212,170,106,0.1);
      color: var(--gl);
    }

    .col-head.ready {
      background: rgba(74,173,117,0.1);
      color: var(--grnl);
    }

    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── TICKET CARD ─── */
    .ticket {
      background: var(--c2);
      border: 1px solid var(--ln2);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.1s;
    }

    .ticket.urgent {
      border-color: #e88080;
      box-shadow: 0 0 0 1px #e88080;
    }

    .tk-head {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .tk-id {
      font-family: var(--serif);
      font-size: 20px;
      color: var(--tan);
      line-height: 1;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .tk-type {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .type-dine-in {
      background: rgba(74,173,117,.2);
      color: var(--grnl);
    }

    .type-takeaway {
      background: rgba(212,170,106,.2);
      color: var(--gl);
    }

    .type-delivery {
      background: rgba(180,150,250,.2);
      color: #c0a8f0;
    }

    .tk-time {
      font-size: 16px;
      font-weight: 700;
      color: var(--tan);
      font-variant-numeric: tabular-nums;
    }

    .tk-wait {
      font-size: 12px;
      color: var(--tan3);
      text-align: right;
      margin-top: 4px;
      font-weight: 600;
    }

    .tk-body {
      flex: 1;
      padding: 12px 16px;
      background: var(--c1);
    }

    .tk-item {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--line);
    }

    .tk-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .it-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .it-qty {
      font-size: 18px;
      font-weight: 800;
      color: var(--tan);
      min-width: 28px;
    }

    .it-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--tan);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .it-opts {
      font-size: 12px;
      color: var(--tan2);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .it-note {
      font-size: 12px;
      color: #e88080;
      font-weight: 600;
      background: rgba(212,79,79,.1);
      padding: 6px 10px;
      border-radius: 8px;
      display: inline-block;
      width: 100%;
      border: 1px solid rgba(212,79,79,.2);
    }

    .tk-foot {
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: var(--c2);
    }

    .btn-bump {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.1s;
    }

    .btn-bump:active {
      transform: scale(0.97);
    }

    .btn-start {
      background: var(--gl);
      color: var(--c0);
    }

    .btn-done {
      background: var(--grnl);
      color: var(--c0);
    }

    .btn-clear {
      background: var(--tan3);
      color: var(--c0);
    }

    .empty-state {
      text-align: center;
      color: var(--tan3);
      margin-top: 40px;
      font-family: var(--serif);
    }

    .error-state {
      text-align: center;
      color: var(--red);
      padding: 20px;
      background: rgba(212,79,79,0.1);
      border-radius: 12px;
    }
  </style>
</head>
<body>

<audio id="kdsAlarm" src="https://actions.google.com/sounds/v1/alarms/spaceship_alarm.ogg" preload="auto"></audio>

<div class="kds-header">
  <div class="brand">Ceramic <span>Kitchen Display</span></div>
  <div class="status-bar">
    <div class="status-item"><div class="dot red"></div> <span id="countNew">0</span> ใหม่</div>
    <div class="status-item"><div class="dot yellow"></div> <span id="countPrep">0</span> กำลังทำ</div>
    <div class="status-item"><div class="dot green"></div> <span id="countReady">0</span> เสร็จแล้ว</div>
    <button class="refresh-btn" id="refreshBtn">↻ รีเฟรช</button>
  </div>
  <div class="clock" id="sysClock">00:00:00</div>
</div>

<div class="kds-board">
  <div class="kds-col">
    <div class="col-head new">📋 ออเดอร์ใหม่</div>
    <div class="col-body" id="colNew"></div>
  </div>
  <div class="kds-col">
    <div class="col-head prep">🔪 กำลังทำ</div>
    <div class="col-body" id="colPrep"></div>
  </div>
  <div class="kds-col">
    <div class="col-head ready">✅ พร้อมเสิร์ฟ</div>
    <div class="col-body" id="colReady"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
  (function() {
    // -------------------- DOM Elements --------------------
    const colNew = document.getElementById('colNew');
    const colPrep = document.getElementById('colPrep');
    const colReady = document.getElementById('colReady');
    const countNewSpan = document.getElementById('countNew');
    const countPrepSpan = document.getElementById('countPrep');
    const countReadySpan = document.getElementById('countReady');
    const refreshBtn = document.getElementById('refreshBtn');
    const alarmAudio = document.getElementById('kdsAlarm');
    
    // -------------------- State --------------------
    let lastNewOrderIds = [];    // เก็บ id ของออเดอร์ใหม่ล่าสุดเพื่อตรวจจับเพิ่ม
    let autoRefreshInterval = null;
    let isLoading = false;
    
    // -------------------- Helper Functions --------------------
    function updateClock() {
      const now = new Date();
      document.getElementById('sysClock').textContent = now.toLocaleTimeString('th-TH');
    }
    
    // คำนวณเวลารอ (นาที)
    function getWaitTime(createdAt) {
      if (!createdAt) return 'ไม่ทราบ';
      const diff = Math.floor((new Date() - new Date(createdAt)) / 60000);
      if (diff < 1) return 'แค่แป๊บ';
      return `${diff} นาที`;
    }
    
    // ตรวจสอบว่า urgent (รอ > 15 นาที)
    function isUrgent(createdAt) {
      if (!createdAt) return false;
      const diff = Math.floor((new Date() - new Date(createdAt)) / 60000);
      return diff > 15;
    }
    
    // แปลง items อย่างปลอดภัย
    function parseItems(items) {
      if (!items) return [];
      if (Array.isArray(items)) return items;
      if (typeof items === 'string') {
        try {
          return JSON.parse(items);
        } catch(e) {
          console.warn('JSON parse error:', e);
          return [];
        }
      }
      return [];
    }
    
    // ฟังก์ชันสร้าง HTML สำหรับการ์ด
    function renderTicket(order, nextStatus, btnText, btnClass = 'btn-start') {
      const items = parseItems(order.items);
      const waitTime = getWaitTime(order.created_at);
      const urgent = isUrgent(order.created_at);
      
      let typeClass = 'type-takeaway';
      if (order.order_type === 'dine-in') typeClass = 'type-dine-in';
      if (order.order_type === 'delivery') typeClass = 'type-delivery';
      
      const itemsHtml = items.map(item => `
        <div class="tk-item">
          <div class="it-row">
            <div class="it-qty">${item.qty || 0}x</div>
            <div>
              <div class="it-name">${escapeHtml(item.name) || 'ไม่มีชื่อ'}</div>
              ${item.opts ? `<div class="it-opts">${escapeHtml(item.opts)}</div>` : ''}
              ${item.note ? `<div class="it-note">⚠️ ${escapeHtml(item.note)}</div>` : ''}
            </div>
          </div>
        </div>
      `).join('');
      
      const notesHtml = order.notes ? `
        <div style="margin-top:12px; padding:8px; background:var(--c2); border-radius:8px; font-size:12px;">
          📝 <strong>หมายเหตุ:</strong> ${escapeHtml(order.notes)}
        </div>
      ` : '';
      
      return `
        <div class="ticket ${urgent ? 'urgent' : ''}">
          <div class="tk-head">
            <div>
              <div class="tk-id">${escapeHtml(order.id)}</div>
              <div class="tk-type ${typeClass}">${order.order_type === 'dine-in' ? 'ทานที่ร้าน' : (order.order_type === 'delivery' ? 'เดลิเวอรี่' : 'กลับบ้าน')}</div>
            </div>
            <div style="text-align:right;">
              <div class="tk-time">${order.created_at ? new Date(order.created_at).toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'}) : '-'}</div>
              <div class="tk-wait" style="color:${urgent ? '#e88080' : 'var(--tan3)'}">⏱️ ${waitTime}</div>
            </div>
          </div>
          <div class="tk-body">
            ${itemsHtml}
            ${notesHtml}
          </div>
          <div class="tk-foot">
            <button class="btn-bump ${btnClass}" onclick="window.bumpOrderStatus('${order.id}', '${nextStatus}')">${btnText}</button>
          </div>
        </div>
      `;
    }
    
    // Escape HTML เพื่อความปลอดภัย
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // ฟังก์ชันหลักโหลดข้อมูลและเรนเดอร์
    async function loadKds() {
      if (isLoading) return;
      isLoading = true;
      
      try {
        // ตรวจสอบว่า API มีหรือไม่
        if (typeof API === 'undefined' || typeof API.getAdminOrders !== 'function') {
          throw new Error('API ไม่พร้อมใช้งาน หรือฟังก์ชัน getAdminOrders ไม่ถูกต้อง');
        }
        
        const response = await API.getAdminOrders();
        if (!response.success) {
          throw new Error(response.message || 'ไม่สามารถโหลดออเดอร์ได้');
        }
        
        const orders = response.data || [];
        
        // แยกตามสถานะ
        const newOrders = orders.filter(o => o.status === 'CONFIRMED');
        const prepOrders = orders.filter(o => o.status === 'PREPARING');
        const readyOrders = orders.filter(o => o.status === 'READY');
        
        // อัปเดตตัวเลข
        countNewSpan.textContent = newOrders.length;
        countPrepSpan.textContent = prepOrders.length;
        countReadySpan.textContent = readyOrders.length;
        
        // ตรวจจับออเดอร์ใหม่ที่เพิ่มขึ้นสำหรับเสียงแจ้งเตือน
        const currentNewIds = newOrders.map(o => o.id).sort();
        const previousNewIds = lastNewOrderIds;
        const hasNew = currentNewIds.length > previousNewIds.length;
        const newlyAdded = hasNew && !currentNewIds.every(id => previousNewIds.includes(id));
        
        // จัดการเสียงและพูด
        if (newlyAdded && newOrders.length > 0) {
          // พูดแจ้งเตือน
          const utterance = new SpeechSynthesisUtterance(`มีออเดอร์ใหม่ ${newOrders.length} รายการ เข้าครัวแล้วค่ะ`);
          utterance.lang = 'th-TH';
          speechSynthesis.cancel(); // ยกเลิกการพูดค้างเพื่อไม่ให้ทับกัน
          speechSynthesis.speak(utterance);
          
          // เล่นเสียงแจ้งเตือนถ้ายังไม่เล่น
          if (alarmAudio.paused) {
            alarmAudio.play().catch(e => console.log('ไม่สามารถเล่นเสียงอัตโนมัติ:', e));
          } else {
            // ถ้ากำลังเล่นอยู่ ให้รีเซ็ตเพื่อเล่นซ้ำ
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            alarmAudio.play().catch(e => console.log('เล่นเสียงซ้ำไม่ได้:', e));
          }
        } else if (newOrders.length === 0) {
          // ถ้าไม่มีออเดอร์ใหม่ หยุดเสียง
          alarmAudio.pause();
          alarmAudio.currentTime = 0;
        }
        
        // อัปเดต lastNewOrderIds
        lastNewOrderIds = currentNewIds;
        
        // เรนเดอร์แต่ละคอลัมน์
        renderColumn(colNew, newOrders, 'PREPARING', '👨‍🍳 เริ่มทำ', 'btn-start');
        renderColumn(colPrep, prepOrders, 'READY', '✅ ทำเสร็จ', 'btn-done');
        renderColumn(colReady, readyOrders, 'COMPLETED', '🗑️ เคลียร์', 'btn-clear');
        
      } catch (error) {
        console.error('loadKds error:', error);
        // แสดงข้อผิดพลาดในแต่ละคอลัมน์
        colNew.innerHTML = `<div class="error-state">⚠️ ${escapeHtml(error.message)}</div>`;
        colPrep.innerHTML = `<div class="error-state">⚠️ ${escapeHtml(error.message)}</div>`;
        colReady.innerHTML = `<div class="error-state">⚠️ ${escapeHtml(error.message)}</div>`;
      } finally {
        isLoading = false;
      }
    }
    
    function renderColumn(container, orders, nextStatus, btnText, btnClass) {
      if (!container) return;
      if (!orders.length) {
        container.innerHTML = '<div class="empty-state">— ไม่มีออเดอร์ —</div>';
        return;
      }
      
      const ticketsHtml = orders.map(order => renderTicket(order, nextStatus, btnText, btnClass)).join('');
      container.innerHTML = ticketsHtml;
    }
    
    // ฟังก์ชันเปลี่ยนสถานะ (ถูกเรียกจาก onclick ในปุ่ม)
    window.bumpOrderStatus = async function(orderId, newStatus) {
      try {
        if (typeof API === 'undefined' || typeof API.updateOrderStatus !== 'function') {
          throw new Error('API.updateOrderStatus ไม่พร้อมใช้งาน');
        }
        const response = await API.updateOrderStatus(orderId, newStatus);
        if (response.success) {
          // โหลดใหม่ทันที
          await loadKds();
        } else {
          console.warn('อัปเดตสถานะล้มเหลว:', response.message);
          alert(`ไม่สามารถเปลี่ยนสถานะ: ${response.message || 'ไม่ทราบสาเหตุ'}`);
        }
      } catch (error) {
        console.error('bumpOrderStatus error:', error);
        alert(`เกิดข้อผิดพลาด: ${error.message}`);
      }
    };
    
    // เริ่มต้นระบบ
    function init() {
      updateClock();
      setInterval(updateClock, 1000);
      
      // โหลดครั้งแรก
      loadKds().then(() => {
        // ตั้ง interval auto refresh (ทุก 10 วินาที)
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(() => {
          loadKds();
        }, 10000);
      });
      
      // ปุ่มรีเฟรช
      refreshBtn.addEventListener('click', () => {
        loadKds();
      });
    }
    
    // เริ่มเมื่อ DOM พร้อม
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
</body>
</html>
