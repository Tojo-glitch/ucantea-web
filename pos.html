<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ceramic POS</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─── */
:root {
  --c0:#0c0b09;--c1:#141310;--c2:#1c1a17;--c3:#252320;--c4:#2f2d29;
  --tan:#e8e0d4;--tan2:#b8ad9e;--tan3:#9e9080;
  --gold:#b8924a;--gl:#d4aa6a;
  --grn:#4aad75;--grnl:#6dbb8a;
  --red:#d44f4f;--line:rgba(255,255,255,.07);--ln2:rgba(255,255,255,.12);
  --serif:'Fraunces',Georgia,serif;
  --sans:'Plus Jakarta Sans','Helvetica Neue',sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; user-select:none; }
body { background:var(--c0); color:var(--tan); font-family:var(--sans); height:100vh; display:flex; overflow:hidden; }
button { font-family:var(--sans); cursor:pointer; border:none; background:none; outline:none; }

/* ─── LAYOUT ─── */
.pos-layout { display:flex; width:100%; height:100%; }
.pos-main { flex:1; display:flex; flex-direction:column; background:var(--c0); }
.pos-sidebar { width:380px; background:var(--c1); border-left:1px solid var(--line); display:flex; flex-direction:column; flex-shrink:0; }

/* ─── HEADER & CATEGORIES ─── */
.main-header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
.brand { font-family:var(--serif); font-size:24px; font-style:italic; color:var(--tan); }
.brand span { color:var(--gl); font-size:11px; font-family:var(--sans); font-style:normal; letter-spacing:1px; text-transform:uppercase; margin-left:6px; }
.cat-scroll { display:flex; gap:8px; overflow-x:auto; padding:16px 24px; scrollbar-width:none; border-bottom:1px solid var(--line); }
.cat-scroll::-webkit-scrollbar { display:none; }
.ctab { height:40px; padding:0 20px; background:var(--c2); border:1px solid var(--ln2); border-radius:20px; font-size:14px; font-weight:600; color:var(--tan3); cursor:pointer; white-space:nowrap; transition:all .15s; }
.ctab.on { background:var(--gold); border-color:var(--gold); color:var(--c0); }

/* ─── MENU GRID ─── */
.menu-grid { flex:1; padding:24px; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:16px; align-content:start; }
.m-card { background:var(--c1); border:1px solid var(--ln2); border-radius:14px; padding:16px; cursor:pointer; transition:transform .1s, border-color .15s; display:flex; flex-direction:column; }
.m-card:active { transform:scale(0.96); border-color:var(--gl); }
.m-name { font-family:var(--serif); font-size:16px; color:var(--tan); margin-bottom:4px; line-height:1.2; }
.m-cat { font-size:11px; color:var(--tan3); margin-bottom:12px; }
.m-price { font-size:16px; font-weight:600; color:var(--gl); margin-top:auto; }

/* ─── TICKET (SIDEBAR) ─── */
.t-header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
.t-title { font-family:var(--serif); font-size:20px; color:var(--tan); }
.t-clear { font-size:12px; color:#e88080; font-weight:600; cursor:pointer; }

.t-items { flex:1; overflow-y:auto; padding:12px 24px; }
.t-item { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--line); }
.t-item:last-child { border-bottom:none; }
.ti-name { font-size:14px; font-weight:600; color:var(--tan); margin-bottom:4px; }
.ti-opt { font-size:11px; color:var(--tan3); }
.ti-price { font-size:14px; font-weight:600; color:var(--tan); text-align:right; }
.ti-ctrl { display:flex; align-items:center; gap:12px; margin-top:8px; background:var(--c2); border-radius:8px; padding:4px; display:inline-flex; border:1px solid var(--ln2); }
.ti-btn { width:28px; height:28px; background:var(--c3); border-radius:6px; color:var(--tan); font-size:16px; display:flex; align-items:center; justify-content:center; }
.ti-qty { font-size:14px; font-weight:600; width:20px; text-align:center; }

/* ─── CUSTOMER & CHECKOUT ─── */
.t-member { padding:16px 24px; border-top:1px solid var(--line); background:var(--c2); }
.mem-inp-row { display:flex; gap:8px; }
.inp { flex:1; height:44px; background:var(--c1); border:1px solid var(--ln2); border-radius:10px; padding:0 14px; color:var(--tan); font-family:var(--sans); font-size:14px; outline:none; }
.btn-sm { height:44px; padding:0 16px; background:var(--c3); border:1px solid var(--ln2); border-radius:10px; color:var(--tan2); font-weight:600; font-size:13px; }
.mem-info { display:flex; justify-content:space-between; align-items:center; background:rgba(212,170,106,.1); border:1px solid rgba(212,170,106,.2); padding:12px 16px; border-radius:10px; display:none; }
.mem-name { font-size:13px; font-weight:600; color:var(--gl); }
.mem-pts { font-size:11px; color:var(--tan3); }

.t-summary { padding:16px 24px 24px; border-top:1px solid var(--line); background:var(--c1); }
.sum-row { display:flex; justify-content:space-between; font-size:14px; color:var(--tan3); margin-bottom:8px; }
.sum-row.total { font-size:20px; font-weight:600; color:var(--tan); margin-top:12px; margin-bottom:16px; }
.sum-row.total .val { color:var(--gl); font-family:var(--serif); font-size:24px; }
.btn-pay { width:100%; height:60px; background:var(--tan); border-radius:14px; font-size:16px; font-weight:600; color:var(--c0); transition:transform .1s; }
.btn-pay:active { transform:scale(0.98); }

/* ─── OVERLAYS ─── */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); z-index:9000; display:none; align-items:center; justify-content:center; }
.overlay.on { display:flex; }
.modal { background:var(--c1); border:1px solid var(--ln2); border-radius:16px; padding:32px; width:400px; text-align:center; }
.modal-title { font-family:var(--serif); font-size:24px; color:var(--tan); margin-bottom:8px; }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div class="overlay on" id="loginOv">
  <div class="modal">
    <div class="brand" style="margin-bottom:24px;">Ceramic <span>POS</span></div>
    <input type="password" id="pinInp" class="inp" placeholder="Enter Staff PIN (e.g. 1234)" style="text-align:center; font-size:20px; letter-spacing:4px;" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn-pay" style="height:48px; margin-top:16px;" onclick="doLogin()">Unlock POS</button>
  </div>
</div>

<div class="pos-layout">
  <!-- LEFT: MENU -->
  <div class="pos-main">
    <div class="main-header">
      <div class="brand">Ceramic <span>Point of Sale</span></div>
      <div style="display:flex; gap:12px;">
        <span style="color:var(--tan3); font-size:13px; display:flex; align-items:center;" id="staffName">Staff: —</span>
        <button class="btn-sm" onclick="location.reload()">Lock</button>
      </div>
    </div>
    
    <div class="cat-scroll" id="catBar">
      <!-- Categories Injected Here -->
    </div>
    
    <div class="menu-grid" id="menuGrid">
      <!-- Products Injected Here -->
    </div>
  </div>

  <!-- RIGHT: TICKET -->
  <div class="pos-sidebar">
    <div class="t-header">
      <div class="t-title">Current Order</div>
      <button class="t-clear" onclick="clearTicket()">Clear</button>
    </div>
    
    <div class="t-items" id="ticketItems">
      <div style="color:var(--tan3); text-align:center; margin-top:40px; font-size:13px;">Ticket is empty</div>
    </div>
    
    <!-- MEMBER SECTION -->
    <div class="t-member">
      <div class="mem-inp-row" id="memInputRow">
        <input type="tel" id="memPhone" class="inp" placeholder="Customer Phone (Opt)">
        <button class="btn-sm" onclick="findMember()">Find</button>
      </div>
      <div class="mem-info" id="memInfoRow">
        <div>
          <div class="mem-name" id="memName">Khun Demo</div>
          <div class="mem-pts" id="memPts">Silver · 245 pts</div>
        </div>
        <button class="t-clear" onclick="removeMember()">Remove</button>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="t-summary">
      <div class="sum-row"><span>Subtotal</span><span id="sumSub">฿0</span></div>
      <div class="sum-row" style="color:var(--grnl); display:none;" id="sumDiscRow"><span>Discount</span><span id="sumDisc">-฿0</span></div>
      <div class="sum-row total"><span>Total</span><span class="val" id="sumTotal">฿0</span></div>
      
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button class="btn-sm" style="flex:1; background:rgba(212,170,106,.1); color:var(--gl); border-color:rgba(212,170,106,.3);" onclick="setOrderType('dine-in', this)" id="btnDineIn">Dine-in</button>
        <button class="btn-sm" style="flex:1;" onclick="setOrderType('takeaway', this)" id="btnTakeaway">Takeaway</button>
      </div>
      
      <button class="btn-pay" id="payBtn" onclick="processCheckout()">Charge <span id="btnTotal">฿0</span></button>
    </div>
  </div>
</div>

<!-- SCRIPTS -->
<script src="config.js"></script>
<script src="api.js"></script>
<script>
  let MENUS = [];
  let TICKET = [];
  let CUR_MEMBER = null;
  let ORDER_TYPE = 'dine-in';

  // --- INIT & LOGIN ---
  function doLogin() {
    const pin = document.getElementById('pinInp').value;
    if(pin === '1234' || pin.length >= 4) { // Mock PIN validation
      document.getElementById('loginOv').classList.remove('on');
      document.getElementById('staffName').textContent = 'Staff: Cashier 1';
      loadMenuData();
    } else {
      alert('Invalid PIN');
    }
  }

  // --- MENU ---
  function loadMenuData() {
    API.getMenu().then(res => {
      MENUS = res.products || window.MENUS || []; // Fallback if API fails
      buildCats();
      renderMenu(MENUS);
    });
  }

  function buildCats() {
    const cats = ['All', ...new Set(MENUS.map(m => m.cat))];
    const el = document.getElementById('catBar');
    el.innerHTML = cats.map((c, i) => `<button class="ctab ${i===0?'on':''}" onclick="filterCat('${c}', this)">${c}</button>`).join('');
  }

  function filterCat(cat, el) {
    document.querySelectorAll('.ctab').forEach(b => b.classList.remove('on'));
    el.classList.add('on');
    renderMenu(cat === 'All' ? MENUS : MENUS.filter(m => m.cat === cat));
  }

  function renderMenu(list) {
    const el = document.getElementById('menuGrid');
    el.innerHTML = list.map(m => `
      <div class="m-card" onclick="addToTicket('${m.id}')">
        <div class="m-name">${m.name}</div>
        <div class="m-cat">${m.cat}</div>
        <div class="m-price">฿${m.price}</div>
      </div>
    `).join('');
  }

  // --- TICKET MANAGEMENT ---
  function addToTicket(id) {
    const item = MENUS.find(m => m.id === id);
    if(!item) return;

    // Default POS options (Regular size, Regular sweet/ice)
    const existing = TICKET.find(t => t.id === id);
    if(existing) {
      existing.qty += 1;
    } else {
      TICKET.push({ uid: Date.now(), id: item.id, name: item.name, price: item.price, qty: 1, opts: 'Regular Size · Reg Sweet' });
    }
    updateTicket();
  }

  function chQty(uid, d) {
    const idx = TICKET.findIndex(t => t.uid === uid);
    if(idx < 0) return;
    TICKET[idx].qty += d;
    if(TICKET[idx].qty <= 0) TICKET.splice(idx, 1);
    updateTicket();
  }

  function clearTicket() {
    if(TICKET.length === 0) return;
    if(confirm('Clear current ticket?')) {
      TICKET = [];
      removeMember();
      updateTicket();
    }
  }

  function updateTicket() {
    const el = document.getElementById('ticketItems');
    let subtotal = 0;

    if(TICKET.length === 0) {
      el.innerHTML = '<div style="color:var(--tan3); text-align:center; margin-top:40px; font-size:13px;">Ticket is empty</div>';
    } else {
      el.innerHTML = TICKET.map(t => {
        subtotal += (t.price * t.qty);
        return `
          <div class="t-item">
            <div style="flex:1; padding-right:12px;">
              <div class="ti-name">${t.name}</div>
              <div class="ti-opt">${t.opts}</div>
              <div class="ti-ctrl">
                <button class="ti-btn" onclick="chQty(${t.uid}, -1)">−</button>
                <div class="ti-qty">${t.qty}</div>
                <button class="ti-btn" onclick="chQty(${t.uid}, 1)">+</button>
              </div>
            </div>
            <div class="ti-price">฿${t.price * t.qty}</div>
          </div>
        `;
      }).join('');
    }

    // Calculations
    const disc = 0; // Can implement manual discount later
    const total = subtotal - disc;

    document.getElementById('sumSub').textContent = `฿${subtotal}`;
    document.getElementById('sumTotal').textContent = `฿${total}`;
    document.getElementById('btnTotal').textContent = `฿${total}`;
    
    document.getElementById('payBtn').disabled = TICKET.length === 0;
    document.getElementById('payBtn').style.opacity = TICKET.length === 0 ? '0.5' : '1';
  }

  // --- MEMBER ---
  function findMember() {
    const phone = document.getElementById('memPhone').value;
    if(!phone) return;
    
    API.getMemberByPhone(phone).then(res => {
      if(res.success) {
        CUR_MEMBER = res.member;
        document.getElementById('memInputRow').style.display = 'none';
        document.getElementById('memInfoRow').style.display = 'flex';
        document.getElementById('memName').textContent = CUR_MEMBER.name;
        document.getElementById('memPts').textContent = `${CUR_MEMBER.tier || 'Member'} · ${CUR_MEMBER.points} pts`;
      } else {
        alert(res.message || 'Member not found');
      }
    });
  }

  function removeMember() {
    CUR_MEMBER = null;
    document.getElementById('memPhone').value = '';
    document.getElementById('memInputRow').style.display = 'flex';
    document.getElementById('memInfoRow').style.display = 'none';
  }

  // --- CHECKOUT ---
  function setOrderType(type, btn) {
    ORDER_TYPE = type;
    document.getElementById('btnDineIn').style = "flex:1;";
    document.getElementById('btnTakeaway').style = "flex:1;";
    btn.style = "flex:1; background:rgba(212,170,106,.1); color:var(--gl); border-color:rgba(212,170,106,.3);";
  }

  function processCheckout() {
    if(TICKET.length === 0) return;
    
    const total = TICKET.reduce((sum, t) => sum + (t.price * t.qty), 0);
    const btn = document.getElementById('payBtn');
    btn.textContent = 'Processing...';

    const payload = {
      items: TICKET,
      total: total,
      branch: { id: 'BR001', name: 'Main Branch — Siam' }, // Default POS branch
      type: ORDER_TYPE,
      userId: CUR_MEMBER ? CUR_MEMBER.id : null,
      source: 'POS'
    };

    API.createOrder(payload).then(res => {
      alert(`Payment Successful!\nOrder ID: ${res.id || 'N/A'}`);
      
      // Print receipt logic can go here
      
      TICKET = [];
      removeMember();
      updateTicket();
      btn.textContent = `Charge ฿0`;
    }).catch(err => {
      alert('Checkout failed');
      btn.textContent = `Charge ฿${total}`;
    });
  }
</script>
</body>
</html>
