<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ceramic | Order Status Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a09;
      font-family: 'Inter', sans-serif;
      color: #f5f0e6;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(212, 170, 106, 0.2);
      background: rgba(10, 10, 9, 0.8);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #d4aa6a 0%, #b8924a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .clock {
      font-size: 24px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      background: rgba(255,255,255,0.05);
      padding: 6px 16px;
      border-radius: 40px;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(212, 170, 106, 0.1);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #6dbb8a;
      box-shadow: 0 0 8px #6dbb8a;
      animation: pulse-green 1.5s infinite;
    }

    @keyframes pulse-green {
      0% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    /* Main Board */
    .board {
      display: flex;
      flex: 1;
      gap: 24px;
      padding: 24px 32px;
      overflow-x: auto;
    }

    .column {
      flex: 1;
      border-radius: 32px;
      background: rgba(28, 26, 23, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }

    .column.left {
      background: linear-gradient(145deg, rgba(212,170,106,0.08) 0%, rgba(28,26,23,0.4) 100%);
    }

    .column.right {
      background: linear-gradient(145deg, rgba(109,187,138,0.08) 0%, rgba(28,26,23,0.4) 100%);
    }

    .col-header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .col-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .col-title i {
      font-size: 26px;
    }

    .col-left .col-title { color: #d4aa6a; }
    .col-right .col-title { color: #6dbb8a; }

    .count-badge {
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 20px;
      font-weight: 800;
    }

    .order-grid {
      flex: 1;
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      align-content: start;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    /* Card styling */
    .order-card {
      background: #1e1c19;
      border-radius: 24px;
      padding: 20px 12px;
      text-align: center;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .order-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #d4aa6a, transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .order-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: rgba(212,170,106,0.4);
      box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    }

    .order-card.ready-card {
      background: linear-gradient(135deg, rgba(109,187,138,0.12), #1e1c19);
      border-color: #6dbb8a;
      box-shadow: 0 0 15px rgba(109,187,138,0.2);
    }

    .order-card.ready-card:hover {
      border-color: #6dbb8a;
      box-shadow: 0 0 20px rgba(109,187,138,0.4);
    }

    /* Animation for new cards */
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .order-card.new-card {
      animation: slideInUp 0.4s ease-out;
    }

    /* Pulse animation for ready cards (only when new) */
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 0 0 rgba(109,187,138,0.6); border-color: #6dbb8a; }
      70% { box-shadow: 0 0 0 12px rgba(109,187,138,0); border-color: #6dbb8a; }
      100% { box-shadow: 0 0 0 0 rgba(109,187,138,0); }
    }

    .order-card.pulse-glow {
      animation: pulse-glow 0.8s ease-out 2;
    }

    .order-number {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fff, #e0d6c8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }

    .order-time {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
      font-weight: 500;
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 18px;
      font-weight: 500;
      background: rgba(0,0,0,0.2);
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    /* Scrollbar */
    .order-grid::-webkit-scrollbar {
      width: 6px;
    }
    .order-grid::-webkit-scrollbar-track {
      background: #2a2824;
      border-radius: 10px;
    }
    .order-grid::-webkit-scrollbar-thumb {
      background: #d4aa6a;
      border-radius: 10px;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .board { padding: 16px; gap: 16px; }
      .col-title { font-size: 22px; }
      .order-number { font-size: 28px; }
      .order-card { padding: 16px 8px; }
      .header { padding: 16px 20px; }
      .clock { font-size: 18px; }
    }
  </style>
</head>
<body>

<audio id="notificationSound" src="https://actions.google.com/sounds/v1/alarms/dinner_bell_triangle.ogg" preload="auto"></audio>

<div class="header">
  <div class="logo">Ceramic Kitchen</div>
  <div class="header-right">
    <div class="status-badge">
      <div class="status-dot"></div>
      <span id="connStatus">Online</span>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>
</div>

<div class="board">
  <!-- Left column: Preparing -->
  <div class="column left">
    <div class="col-header">
      <div class="col-title">
        <i class="fas fa-fire"></i> กำลังเตรียม
      </div>
      <div class="count-badge" id="prepCount">0</div>
    </div>
    <div class="order-grid" id="prepGrid">
      <div class="empty-msg">⌛ กำลังโหลดข้อมูล...</div>
    </div>
  </div>

  <!-- Right column: Ready to collect -->
  <div class="column right">
    <div class="col-header">
      <div class="col-title">
        <i class="fas fa-bell"></i> พร้อมรับ
      </div>
      <div class="count-badge" id="readyCount">0</div>
    </div>
    <div class="order-grid" id="readyGrid">
      <div class="empty-msg">🔔 รอออเดอร์ใหม่...</div>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
  (function() {
    // DOM elements
    const prepGrid = document.getElementById('prepGrid');
    const readyGrid = document.getElementById('readyGrid');
    const prepCountSpan = document.getElementById('prepCount');
    const readyCountSpan = document.getElementById('readyCount');
    const connStatusSpan = document.getElementById('connStatus');
    const sound = document.getElementById('notificationSound');
    const clockEl = document.getElementById('clock');

    // State
    let lastReadyIds = new Set();      // เก็บ ID ของออเดอร์ที่พร้อมรับรอบก่อน
    let refreshInterval = null;
    let isFirstLoad = true;

    // Helper: extract short ID (after last dash)
    function getShortId(fullId) {
      if (!fullId) return '???';
      const parts = fullId.split('-');
      return parts[parts.length - 1] || fullId;
    }

    // Format time from created_at (HH:MM)
    function formatOrderTime(isoString) {
      if (!isoString) return '';
      try {
        const date = new Date(isoString);
        return date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      } catch(e) {
        return '';
      }
    }

    // Render orders with animation detection
    function renderColumns(orders) {
      // Filter orders by status
      const preparing = orders.filter(o => o.status === 'CONFIRMED' || o.status === 'PREPARING');
      const ready = orders.filter(o => o.status === 'READY');

      // Update counters
      prepCountSpan.innerText = preparing.length;
      readyCountSpan.innerText = ready.length;

      // --- Render Preparing column (no special animation, just simple) ---
      if (preparing.length === 0) {
        prepGrid.innerHTML = '<div class="empty-msg">🍳 ไม่มีออเดอร์ในครัว</div>';
      } else {
        prepGrid.innerHTML = preparing.map(order => `
          <div class="order-card" data-id="${order.id}">
            <div class="order-number">#${getShortId(order.id)}</div>
            <div class="order-time">${formatOrderTime(order.created_at)}</div>
          </div>
        `).join('');
      }

      // --- Render Ready column with new order detection & animations ---
      const currentReadyIds = new Set(ready.map(o => o.id));
      const newReadyOrders = ready.filter(o => !lastReadyIds.has(o.id));

      // Play sound and visual notifications for new orders
      if (newReadyOrders.length > 0 && !isFirstLoad) {
        // Play sound if any new READY order
        sound.play().catch(e => console.log('เสียงถูกบล็อกโดยเบราว์เซอร์'));
        // Also show count badge animation later
      }

      // Build ready grid HTML
      if (ready.length === 0) {
        readyGrid.innerHTML = '<div class="empty-msg">📦 ยังไม่มีออเดอร์พร้อมรับ</div>';
      } else {
        readyGrid.innerHTML = ready.map(order => `
          <div class="order-card ready-card ${newReadyOrders.some(o => o.id === order.id) ? 'new-card pulse-glow' : ''}" data-id="${order.id}">
            <div class="order-number">#${getShortId(order.id)}</div>
            <div class="order-time">${formatOrderTime(order.created_at)}</div>
          </div>
        `).join('');
      }

      // Update lastReadyIds for next cycle
      lastReadyIds = currentReadyIds;
      isFirstLoad = false;
    }

    // Function to fetch data and update UI
    async function fetchAndUpdate() {
      try {
        if (typeof API === 'undefined' || !API.getAdminOrders) {
          throw new Error('API ไม่พร้อมใช้งาน');
        }

        const response = await API.getAdminOrders();
        if (!response.success) {
          throw new Error(response.message || 'ไม่สามารถโหลดข้อมูลได้');
        }

        const orders = response.data || [];
        renderColumns(orders);
        connStatusSpan.innerText = 'Online';
        connStatusSpan.style.color = '#6dbb8a';
      } catch (error) {
        console.error('Fetch error:', error);
        connStatusSpan.innerText = 'Offline';
        connStatusSpan.style.color = '#e88080';
        // Optionally show error in columns
        prepGrid.innerHTML = '<div class="empty-msg">⚠️ เชื่อมต่อล้มเหลว กำลังลองใหม่...</div>';
        readyGrid.innerHTML = '<div class="empty-msg">⚠️ เชื่อมต่อล้มเหลว กำลังลองใหม่...</div>';
      }
    }

    // Auto-refresh every 3 seconds
    function startAutoRefresh() {
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(fetchAndUpdate, 3000);
    }

    // Clock update
    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // Initialization
    function init() {
      updateClock();
      setInterval(updateClock, 1000);
      fetchAndUpdate().then(() => {
        startAutoRefresh();
      }).catch(() => startAutoRefresh());
    }

    init();
  })();
</script>
</body>
</html>
