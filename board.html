<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Status Board</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0c0b09; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  .header { padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .logo { font-size: 28px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #d4aa6a; }
  
  .board-container { display: flex; flex: 1; }
  .col { flex: 1; padding: 40px 60px; display: flex; flex-direction: column; }
  .col.left { border-right: 1px solid rgba(255,255,255,0.1); background: linear-gradient(135deg, rgba(212,170,106,0.05) 0%, transparent 50%); }
  .col.right { background: linear-gradient(135deg, rgba(109,187,138,0.05) 0%, transparent 50%); }
  
  .col-title { font-size: 32px; font-weight: 600; margin-bottom: 40px; text-align: center; letter-spacing: 1px; }
  .col.left .col-title { color: #d4aa6a; }
  .col.right .col-title { color: #6dbb8a; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 24px; align-content: start; }
  
  .q-card { background: #1c1a17; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: 800; color: #fff; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  
  .q-card.ready { background: rgba(109,187,138,0.15); border-color: #6dbb8a; color: #6dbb8a; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(109,187,138,0.4); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(109,187,138,0); } 100% { transform: scale(1); } }
  
  .empty-msg { grid-column: 1 / -1; text-align: center; font-size: 20px; color: #666; margin-top: 40px; }
</style>
</head>
<body>

<audio id="ding" src="https://actions.google.com/sounds/v1/alarms/dinner_bell_triangle.ogg"></audio>

<div class="header">
  <div class="logo">Ceramic</div>
  <div style="font-size:18px; color:#999;" id="clock">00:00</div>
</div>

<div class="board-container">
  <div class="col left">
    <div class="col-title">Preparing (กำลังเตรียม)</div>
    <div class="grid" id="prepGrid"><div class="empty-msg">Waiting for connection...</div></div>
  </div>
  <div class="col right">
    <div class="col-title">Please Collect (เชิญรับเครื่องดื่ม)</div>
    <div class="grid" id="readyGrid"><div class="empty-msg">Waiting for connection...</div></div>
  </div>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
  setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}), 1000);

  let lastReadyCount = 0;
  function updateBoard() {
    // ใช้ getAdminOrders เพื่อดึงคิวทั้งหมด
    if(!window.API) return; 
    API.getAdminOrders().then(res => {
      if(!res.success) return;
      const prep = res.data.filter(o => o.status === 'PREPARING' || o.status === 'CONFIRMED');
      const ready = res.data.filter(o => o.status === 'READY');

      if(ready.length > lastReadyCount) {
        document.getElementById('ding').play().catch(()=>{});
      }
      lastReadyCount = ready.length;

      document.getElementById('prepGrid').innerHTML = prep.length ? prep.map(o => `<div class="q-card">${o.id.split('-')[1] || o.id}</div>`).join('') : `<div class="empty-msg">No active orders</div>`;
      document.getElementById('readyGrid').innerHTML = ready.length ? ready.map(o => `<div class="q-card ready">${o.id.split('-')[1] || o.id}</div>`).join('') : `<div class="empty-msg">No ready orders</div>`;
    }).catch(e => console.log("API Error:", e));
  }
  setInterval(updateBoard, 3000);
  setTimeout(updateBoard, 1000); // โหลดครั้งแรก
</script>
</body>
</html>
